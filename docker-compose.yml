version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: courses-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    networks:
      - courses-network

  redis:
    image: redis:7-alpine
    container_name: courses-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - courses-network
    command: >
      redis-server 
      --appendonly yes 
      ${REDIS_PASSWORD:+--requirepass ${REDIS_PASSWORD}}
    # healthcheck:
    #   test: ["CMD", "redis-cli", "ping"]
    #   interval: 10s
    #   timeout: 5s
    #   retries: 3

  backend:
    build: ../Ulton-backend
    container_name: courses-backend
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    environment:
      SPRING_PROFILES_ACTIVE: docker
      # PostgreSQL
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      # Redis
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: ${REDIS_PORT:-6379}
      SPRING_REDIS_PASSWORD: ${REDIS_PASSWORD}
      # Email
      GMAIL_APP_PASSWORD: ${GMAIL_APP_PASSWORD}
      APP_ADMIN_EMAIL: ${APP_ADMIN_EMAIL}
    ports:
      - "${BACKEND_PORT}:8080"
    networks:
      - courses-network

  frontend:
    build: ../Ulton-frontend
    container_name: courses-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      REACT_APP_API_URL: http://localhost:${BACKEND_PORT}
    ports:
      - "${FRONTEND_PORT}:3000"
    networks:
      - courses-network

networks:
  courses-network:
    driver: bridge

volumes:
  postgres_data:
    name: courses-postgres-data
  redis_data:
    name: courses-redis-data